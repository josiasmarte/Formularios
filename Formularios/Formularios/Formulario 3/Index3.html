<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Admisión</title>
    <link rel="stylesheet" href="styles3.css">
</head>
<body>

<div class="container">

    <div class="left-bar">
        <span>www.yourwebhere.com</span>
    </div>

    <div class="form-content">

        <div class="header">
            <div>
                <h1>FORMULARIO<br>DE ADMISIÓN</h1>
                <p class="subtitle">¡Bienvenido al proceso de admisión!</p>
                <p class="mini">Plantillas editables de Edit.org para crear un formulario de paciente o cliente</p>
            </div>

            <div class="logo-box">TU<br>LOGO</div>
        </div>

        <div class="section-title">DATOS PERSONALES</div>

        <form>

            <label>NOMBRE Y APELLIDOS</label>
            <input type="text" value="">

            <div class="row">
                <div class="col">
                    <label>FECHA DE NACIMIENTO</label>
                    <input type="text" value="26/02/2029">
                </div>
                <div class="col">
                    <label>SEXO</label>
                    <div class="sexo">
                        <label><input type="checkbox"> Masculino</label>
                        <label><input type="checkbox"> Femenino</label>
                    </div>
                </div>
            </div>

            <label>NÚMERO DE TELÉFONO</label>
            <input type="text" value="01234567890">

            <hr>

            <label>DIRECCIÓN</label>
            <input type="text">

            <div class="row">
                <div class="col">
                    <label>CIUDAD</label>
                    <input type="text">
                </div>
                <div class="col">
                    <label>REGIÓN</label>
                    <input type="text">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>CÓDIGO POSTAL</label>
                    <input type="text">
                </div>
                <div class="col">
                    <label>PAÍS</label>
                    <input type="text">
                </div>
            </div>

            <label>CORREO ELECTRÓNICO</label>
            <input type="email">

            <p class="nota">
                Compruebe que el contenido del formulario contiene correctamente sus datos personales.
            </p>

            <div class="firma">
                <div class="linea"></div>
                <span>Firma/Fecha</span>
            </div>

        </form>
    </div>

    <div class="right-bar"></div>

</div>

</body>
</html>
