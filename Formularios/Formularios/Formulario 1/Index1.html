<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Inscripción</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="container">

    <div class="sidebar"></div>

    <div class="form-container">

        <div class="top-bar">
            <h1>FORMULARIO DE INSCRIPCIÓN</h1>
            <div class="website">www.yourwebhere.com</div>
        </div>

        <form>

            <label>Solicitud de ingreso a:</label>
            <input type="text" placeholder="Tu texto aquí">

            <label>Director/Presidente</label>
            <input type="text">

            <label>Tipo de Afiliación</label>
            <div class="afiliacion">
                <label><input type="radio" name="tipo"> Bronce</label>
                <label><input type="radio" name="tipo"> Plata</label>
                <label><input type="radio" name="tipo"> Oro</label>
            </div>

            <label>Solicitantes / Titular de cuenta</label>
            <input type="text">

            <div class="row">
                <div class="col">
                    <label>Nombre de Pila</label>
                    <input type="text">
                </div>
                <div class="col">
                    <label>Dirección</label>
                    <input type="text">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>Fecha de Nacimiento</label>
                    <input type="date">
                </div>
                <div class="col">
                    <label>Nacionalidad</label>
                    <input type="text">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>Sexo</label>
                    <input type="text">
                </div>
                <div class="col">
                    <label>Ciudad/País</label>
                    <input type="text">
                </div>
            </div>

            <label>Correo Electrónico</label>
            <input type="email" placeholder="@">

            <div class="row">
                <div class="col">
                    <label>Permiso de Conducir</label>
                    <input type="text">
                </div>
                <div class="col">
                    <label>Otro Número de Tarjeta</label>
                    <input type="text">
                </div>
            </div>

            <p class="nota">
                Compruebe que el contenido del formulario contenga correctamente sus datos personales.
            </p>

            <div class="footer">
                <div class="logo-box">TU LOGO</div>
                <div class="firma">Firma/Fecha</div>
            </div>

        </form>

    </div>
</div>

</body>
</html>
