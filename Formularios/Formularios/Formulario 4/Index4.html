<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Médico</title>
    <link rel="stylesheet" href="/Formularios/Formulario 4/style4.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="logo-square"></div>
        <div class="header-text">
            <h1>FORMULARIO MÉDICO</h1>
            <h2>NOMBRE DEL CENTRO MÉDICO</h2>
        </div>
    </div>

    <form>

        <!-- INFORMACIÓN DEL PACIENTE -->
        <div class="section">
            <h3>INFORMACIÓN DEL PACIENTE</h3>
            <div class="line"></div>

            <label>Nombre y Apellidos:</label>
            <input type="text">

            <label>Fecha de Nacimiento:</label>
            <input type="date">

            <label>Dirección:</label>
            <input type="text">

            <label>Teléfono:</label>
            <input type="text">

            <label>Sexo:</label>
            <div class="sexo">
                <label><input type="checkbox"> Masculino</label>
                <label><input type="checkbox"> Femenino</label>
                <label><input type="checkbox"> Otro</label>
            </div>

            <label>Código Postal:</label>
            <input type="text">

            <label>Correo Electrónico:</label>
            <input type="email">
        </div>

        <!-- MOTIVO VISITA -->
        <div class="section">
            <h3>MOTIVO DE LA VISITA</h3>
            <div class="line"></div>

            <p class="descripcion">Describir los síntomas o el motivo de esta visita</p>

            <textarea rows="5"></textarea>
        </div>

        <!-- INFORMACIÓN DEL SEGURO -->
        <div class="section">
            <h3>INFORMACIÓN DEL SEGURO</h3>
            <div class="line"></div>

            <label>Seguro Proveniente:</label>
            <input type="text">

            <label>Número de Póliza:</label>
            <input type="text">
        </div>

        <!-- CONTACTO EMERGENCIA -->
        <div class="section">
            <h3>INFORMACIÓN DE CONTACTO EN CASO DE EMERGENCIA</h3>
            <div class="line"></div>

            <label>Nombre y Apellidos:</label>
            <input type="text">

            <label>Número de Teléfono:</label>
            <input type="text">

            <label>Email:</label>
            <input type="email">
        </div>

        <!-- FIRMA -->
        <div class="firma">
            <div class="fecha">Mes, 10, 2029</div>
            <div class="firma-linea"></div>
            <span>Nombre y Apellidos</span>
        </div>

    </form>

    <!-- FOOTER -->
    <div class="footer">
        <div>
            <strong>WWW.YOURWEBHERE.COM</strong><br>
            @tuperfil
        </div>
        <div class="logo-footer">TU<br>LOGO</div>
    </div>

</div>

</body>
</html>
