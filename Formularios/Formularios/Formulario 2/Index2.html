<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="styles2.css">
</head>
<body>

<div class="page">

    <!-- Flechas decorativas -->
    <div class="arrows top">
        <span></span><span></span><span></span>
    </div>

    <h1>FORMULARIO DE REGISTRO</h1>
    <div class="gym-name">NOMBRE DEL GIMNASIO</div>

    <form class="form">

        <label>Nombre</label>
        <input type="text">

        <label>Género</label>
        <div class="radio">
            <label><input type="radio" name="g"> Masculino</label>
            <label><input type="radio" name="g"> Femenino</label>
        </div>

        <label>Edad</label>
        <input type="number">

        <label>Fecha de nacimiento</label>
        <input type="date">

        <label>Dirección</label>
        <input type="text">

        <label>Calle</label>
        <input type="text">

        <label>Ciudad</label>
        <input type="text">

        <label>Número de teléfono</label>
        <input type="tel">

        <label>Código postal</label>
        <input type="text">

        <label>Correo electrónico</label>
        <input type="email">

        <p class="legal">
            Mantenemos los datos personales durante el tiempo necesario para cumplir con la finalidad para la cual fueron recopilados.
        </p>

        <div class="sign">
            <div>
                <label>Fecha</label>
                <input type="text">
            </div>
            <div>
                <label>Firma</label>
                <input type="text">
            </div>
        </div>

        <p class="thanks">GRACIAS</p>

    </form>

    <footer>www.yourwebhere.com</footer>

    <!-- Flechas decorativas -->
    <div class="arrows bottom">
        <span></span><span></span><span></span>
    </div>

    <!-- Logo -->
    <div class="logo">TU<br>LOGO</div>

</div>

</body>
</html>
